<!DOCTYPE html>
<html>
<head><title>Logo El Trébol Rojo</title></head>
<body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f">
<div style="text-align:center">
<svg width="400" height="400" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4466"/>
      <stop offset="100%" stop-color="#cc1133"/>
    </linearGradient>
  </defs>
  <g transform="translate(50,45)">
    <ellipse cx="0" cy="-18" rx="14" ry="18" fill="url(#g)" opacity="0.95"/>
    <ellipse cx="-15" cy="2" rx="14" ry="18" fill="url(#g)" opacity="0.9" transform="rotate(-30,-15,2)"/>
    <ellipse cx="15" cy="2" rx="14" ry="18" fill="url(#g)" opacity="0.9" transform="rotate(30,15,2)"/>
    <ellipse cx="0" cy="-10" rx="3" ry="3" fill="#ff6688" opacity="0.3"/>
    <rect x="-1.5" y="8" width="3" height="22" rx="1.5" fill="#2d8544"/>
  </g>
</svg>
<p style="color:white;font-family:sans-serif;font-size:24px;font-weight:800;margin-top:10px">EL TRÉBOL ROJO</p>
<p style="color:#888;font-family:sans-serif;font-size:12px">Hacé clic derecho en la imagen → "Guardar imagen como..."</p>
</div>
</body>
</html>
